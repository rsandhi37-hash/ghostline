<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a05;--g:#00cc44;--gd:#007722;--gf:#003311;--td:#007733;--tf:#004422;
  --mono:'Share Tech Mono',monospace;--hk:'Orbitron',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--g);font-family:var(--mono);overflow:hidden;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px)}
#mx{position:fixed;inset:0;opacity:.04;z-index:0}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;position:relative}
.logo{font-family:var(--hk);font-size:clamp(26px,8vw,42px);font-weight:900;letter-spacing:6px;color:var(--g);text-align:center;margin-bottom:4px}
.tagline{font-size:10px;color:var(--td);letter-spacing:4px;text-align:center;margin-bottom:40px;text-transform:uppercase}
.enter-btn{
  background:transparent;border:1px solid var(--g);color:var(--g);
  font-family:var(--hk);font-size:12px;letter-spacing:3px;
  padding:16px 40px;cursor:pointer;text-transform:uppercase;
  transition:all .2s;text-decoration:none;display:inline-block;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  position:relative;overflow:hidden;
}
.enter-btn::before{content:'';position:absolute;inset:0;background:var(--g);transform:translateX(-100%);transition:transform .25s}
.enter-btn:hover::before,.enter-btn:active::before{transform:translateX(0)}
.enter-btn:hover,.enter-btn:active{color:var(--bg)}
.enter-btn span{position:relative;z-index:1}
.status-row{display:flex;align-items:center;gap:8px;margin-top:28px;font-size:9px;color:var(--tf);letter-spacing:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.install-bar{
  position:fixed;bottom:0;left:0;right:0;background:#0a180a;border-top:1px solid var(--gd);
  padding:12px 16px;display:none;align-items:center;justify-content:space-between;gap:12px;z-index:100;
}
.install-bar.show{display:flex}
.install-text{font-size:11px;color:var(--td);letter-spacing:.8px;line-height:1.5}
.install-text strong{color:var(--g);display:block;font-size:12px;margin-bottom:2px}
.install-actions{display:flex;gap:8px;flex-shrink:0}
.install-btn{background:var(--gf);border:1px solid var(--g);color:var(--g);font-family:var(--mono);font-size:10px;padding:7px 12px;cursor:pointer;letter-spacing:1px;white-space:nowrap;transition:all .2s}
.install-btn:hover{background:var(--g);color:var(--bg)}
.dismiss-btn{background:none;border:1px solid var(--gd);color:var(--td);font-family:var(--mono);font-size:10px;padding:7px 10px;cursor:pointer}
.update-bar{
  position:fixed;top:0;left:0;right:0;background:#001a00;border-bottom:1px solid var(--gd);
  padding:8px 16px;display:none;align-items:center;justify-content:space-between;
  gap:12px;z-index:100;font-size:10px;color:var(--td);letter-spacing:1px;
}
.update-bar.show{display:flex}
.reload-btn{background:var(--gf);border:1px solid var(--g);color:var(--g);font-family:var(--mono);font-size:9px;padding:5px 10px;cursor:pointer;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="mx"></canvas>
<div class="splash">
  <div class="logo">GHOSTLINE</div>
  <div class="tagline">Anonymous · Encrypted · Ephemeral</div>
  <a class="enter-btn" href="ghostline.html"><span>[ ENTER ]</span></a>
  <div class="status-row">
    <span class="dot"></span>
    <span id="sw-status">INITIALIZING...</span>
  </div>
</div>

<div class="install-bar" id="install-bar">
  <div class="install-text">
    <strong>📲 Install GhostLine</strong>
    Add to home screen for full-screen experience
  </div>
  <div class="install-actions">
    <button class="install-btn" id="install-btn">INSTALL</button>
    <button class="dismiss-btn" id="dismiss-btn">✕</button>
  </div>
</div>

<div class="update-bar" id="update-bar">
  <span>⚡ New update available</span>
  <button class="reload-btn" id="reload-btn">RELOAD</button>
</div>

<script>
/* ══════════════════════════════════
   SECRET ADMIN ROUTE
   Access admin panel via:
   yoursite.com/?admin=x7k9-control-gl
   or
   yoursite.com/x7k9-control-gl (if server supports)

   Change the secret below to your own!
══════════════════════════════════ */
const ADMIN_SECRET = "x7k9-control-gl";

// Check if secret is in URL query param
const params = new URLSearchParams(location.search);
if (params.get("admin") === ADMIN_SECRET) {
  // Silently redirect to admin panel
  window.location.replace("ghostline-admin.html");
}

/* ── Matrix Rain ── */
(()=>{
  const c=document.getElementById("mx"),x=c.getContext("2d");
  const rs=()=>{c.width=innerWidth;c.height=innerHeight;};rs();
  window.addEventListener("resize",rs);
  const ch="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>?/|{}[]";
  let d=Array(Math.floor(innerWidth/20)).fill(1);
  window.addEventListener("resize",()=>{d=Array(Math.floor(innerWidth/20)).fill(1);});
  setInterval(()=>{
    x.fillStyle="rgba(5,10,5,0.05)";x.fillRect(0,0,c.width,c.height);
    x.fillStyle="#00cc44";x.font="14px Share Tech Mono";
    d.forEach((y,i)=>{x.fillText(ch[Math.floor(Math.random()*ch.length)],i*20,y*20);
      if(y*20>c.height&&Math.random()>.975)d[i]=0;d[i]++;});
  },80);
})();

/* ── Service Worker ── */
const swStatus=document.getElementById("sw-status");
if("serviceWorker" in navigator){
  window.addEventListener("load",async()=>{
    try{
      const reg=await navigator.serviceWorker.register("sw.js",{scope:"./"});
      swStatus.textContent=navigator.serviceWorker.controller?"APP MODE ACTIVE ✓":"SECURE NODE CONNECTED";
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed"&&navigator.serviceWorker.controller)
            document.getElementById("update-bar").classList.add("show");
        });
      });
    }catch(e){swStatus.textContent="DIRECT MODE";}
  });
  let ref=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{if(!ref){ref=true;location.reload();}});
}else{
  swStatus.textContent="DIRECT MODE";
}

/* ── Install Prompt ── */
let dp=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;
  setTimeout(()=>{
    if(!sessionStorage.getItem("install-dismissed"))
      document.getElementById("install-bar").classList.add("show");
  },2500);
});
document.getElementById("install-btn").addEventListener("click",async()=>{
  if(!dp)return;
  dp.prompt();
  const{outcome}=await dp.userChoice;
  if(outcome==="accepted"){
    document.getElementById("install-bar").classList.remove("show");
    swStatus.textContent="APP INSTALLED ✓";
  }
  dp=null;
});
document.getElementById("dismiss-btn").addEventListener("click",()=>{
  document.getElementById("install-bar").classList.remove("show");
  sessionStorage.setItem("install-dismissed","1");
});
document.getElementById("reload-btn").addEventListener("click",()=>location.reload());

/* ── If already installed as PWA, go directly to chat ── */
if(window.matchMedia("(display-mode: fullscreen)").matches||
   window.matchMedia("(display-mode: standalone)").matches||
   window.navigator.standalone===true){
  window.location.replace("ghostline.html");
}
</script>
</body>
</html>
